name: docs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  docs:
    name: "Deploy docs"
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      pages: write  # To create pages deployments when calling the GitHub API
      id-token: write # To request the OIDC JWT token

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: true

      - uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@5c62c5926145985eec91f09e2e0a75f40daed929
        with:
          version: "0.10.2"
          enable-cache: true

      - run: uv sync --frozen --extra docs

      - run: uv run --no-sync --frozen mkdocs gh-deploy --config-file mkdocs.yml --force --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs-build:
    name: "Test docs build"
    runs-on: ubuntu-24.04
    if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
    permissions: {}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false

      - uses: actions/setup-python@28f2168f4d98ee0445e3c6321f6e6616c83dd5ec
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@5c62c5926145985eec91f09e2e0a75f40daed929
        with:
          version: "0.10.2"
          enable-cache: true

      - run: uv sync --frozen --extra docs

      - run: uv run --no-sync --frozen mkdocs build --config-file mkdocs.yml --strict
