name: External packages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # workflow_dispatch:
  # schedule:
  #   - cron: "0 23 * * 2,3,4"

jobs:
  test-manifest:
    runs-on: ubuntu-24.04
    strategy:
      # Do not make the whole matrix fail if one element fails
      fail-fast: false
      matrix:
        package: [skip]
        github_repo: [skip]
        github_branch: [skip]
        cmd_install: [skip]
        non_core: [skip]

        include:

          - package: fractal-tasks-core
            github_repo: fractal-analytics-platform/fractal-tasks-core
            github_branch: v2
            cmd_install: "python -m pip install -e .[fractal-tasks]"
            non_core: false

          - package: fractal-uzh-converters
            github_repo: fractal-analytics-platform/fractal-uzh-converters
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: false

          - package: fractal-cellpose-sam-task
            github_repo: fractal-analytics-platform/fractal-cellpose-sam-task
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: false

          - package: fractal-helper-tasks
            github_repo: fractal-analytics-platform/fractal-helper-tasks
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: false

          - package: example-tasks
            github_repo: fractal-analytics-platform/example-fractal-task-arguments
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: false

          - package: operetta-compose
            github_repo: leukemia-kispi/operetta-compose
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: true

          - package: zmb-fractal-tasks
            github_repo: tcompa/zmb-fractal-tasks
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: true

          - package: APx_fractal_task_collection
            github_repo: Apricot-Therapeutics/APx_fractal_task_collection
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: true

          - package: fractal-ome-zarr-hcs-stitching
            github_repo: m-albert/fractal-ome-zarr-hcs-stitching
            github_branch: main
            cmd_install: "python -m pip install -e ."
            non_core: true

        exclude:
          - package: skip
            github_repo: skip
            github_branch: skip
            cmd_install: skip
            non_core: skip

    steps:
      - name: Print matrix-element information
        run: echo '${{ matrix.package }}, ${{ matrix.github_repo }}, ${{ matrix.github_branch }}, ${{ matrix.cmd_install }}'

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update pip
        run: python -m pip install --upgrade pip

      - name: Get package source code
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.github_repo }}
          ref: ${{ matrix.github_branch }}
          persist-credentials: false

      - name: Get current branch of `fractal-task-tools`
        uses: actions/checkout@v4
        with:
          path: fractal-task-tools
          persist-credentials: false

      - name: Install package
        continue-on-error: ${{ matrix.non_core }}
        run: ${{ matrix.cmd_install }}

      - name: Install current version of `fractal-task-tools`
        run: python -m pip install ./fractal-task-tools

      - name: Check manifest
        continue-on-error: ${{ matrix.non_core }}
        run: fractal-manifest check --package ${{ matrix.package }} --verbose

      - name: Install current version of `fractal-task-tools` with `dev` extra
        run: python -m pip install ./fractal-task-tools[dev]

      - name: Validate manifest with different JSON Schema drafts
        continue-on-error: ${{ matrix.non_core }}
        run: python ./fractal-task-tools/tests/scripts/validate_multi_draft.py

      - name: Validate manifest against fractal-server schema
        continue-on-error: ${{ matrix.non_core }}
        run: python ./fractal-task-tools/tests/scripts/validate_with_fractal_server.py

  test-manifest-pixi:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ilastik-tasks
            github_repo: fractal-analytics-platform/fractal-ilastik-tasks
            github_branch: main
            non_core: false

    steps:
      - name: Print matrix-element information
        run: echo '${{ matrix.package }}, ${{ matrix.github_repo }}, ${{ matrix.github_branch }}'

      - name: Get package source code
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.github_repo }}
          ref: ${{ matrix.github_branch }}
          persist-credentials: false

      - name: Get current branch of `fractal-task-tools`
        uses: actions/checkout@v4
        with:
          path: fractal-task-tools
          persist-credentials: false

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.0
        with:
          run-install: false

      - name: Install package
        continue-on-error: ${{ matrix.non_core }}
        run: pixi install

      - name: Install current version of `fractal-task-tools`
        run: pixi run pip install ./fractal-task-tools

      - name: Check manifest
        continue-on-error: ${{ matrix.non_core }}
        run: pixi run fractal-manifest check --package ${{ matrix.package }} --verbose

      - name: Install current version of `fractal-task-tools` with `dev` extra
        run: pixi run pip install ./fractal-task-tools[dev]

      - name: Validate manifest with different JSON Schema drafts
        continue-on-error: ${{ matrix.non_core }}
        run: pixi run python ./fractal-task-tools/tests/scripts/validate_multi_draft.py

      - name: Validate manifest against fractal-server schema
        continue-on-error: ${{ matrix.non_core }}
        run: pixi run python ./fractal-task-tools/tests/scripts/validate_with_fractal_server.py
